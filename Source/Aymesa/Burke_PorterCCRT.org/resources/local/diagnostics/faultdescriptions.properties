
# Faultdescriptionmap.properties
# LENGTH TEMPLATE =  ~43 chars
# FOR FORD FLATROCK 506422

AirDoorNotLoweredFault = Air door was not sensed by "Air Door Lowered" switch.  Check "Air Door Lowered" switch and solenoid.
AirDoorNotRaisedFault = Air door was not sensed by "Air Door Raised" switch.  Check "Air Door Raised" switch and solenoid.
ExhaustDoorLoweredFault = Exhaust door was not sensed by "Exhaust Door Lowered" switch.  Check "Exhaust Door Lowered" switch and solenoid.
ExhaustDoorRaisedFault = Exhaust door was not sensed by "Exhaust Door Raised" switch.  Check "Exhaust Door Raised" switch and solenoid.
FrontRetainingRollsLoweredFault = Front Retaining Rolls were not sensed by "Front Retaining Rolls Lowered" switch.  Check "Front Retaining Rolls Lowered" switch and solenoid.
FrontRetainingRollsRaisedFault = Front Retaining Rolls were not sensed by "Front Retaining Rolls Raised" switch.  Check "Front Retaining Rolls Raised" switch and solenoid.
IntermediateRetainingRollsLoweredFault = Intermediate Retaining Rolls were not sensed by "Intermediate Retaining Rolls Lowered" switch.  Check "Intermediate Retaining Rolls Lowered" switch and solenoid.
IntermediateRetainingRollsRaisedFault = Intermediate Retaining Rolls were not sensed by "Intermediate Retaining Rolls Raised" switch.  Check "Intermediate Retaining Rolls Raised" switch and solenoid.
LeftFrontRollMotorDisconnectOpen = Left front roll motor disconnect is in OFF (open) position.  Make sure that no one is performing maintenance and then place disconnect in ON (closed) position.
LeftFrontRollMotorDriveFault = Drive problem.  Drop and raise retaining rolls to clear the fault.  If this does not work, press the RESET key on the motor drive keypad.  Check encoder and coupling.  If the fault does not clear or continues to set frequently, contact Burke E. Porter for assistance.
LeftRearRollMotorDisconnectOpen = Left rear roll motor disconnect is in OFF (open) position.  Make sure that no one is performing maintenance and then place disconnect in ON (closed) position.
LeftRearRollMotorDriveFault = Drive problem.  Drop and raise retaining rolls to clear the fault.  If this does not work, press the RESET key on the motor drive keypad.  Check encoder and coupling.  If the fault does not clear or continues to set frequently, contact Burke E. Porter for assistance.
LeftStopPostLoweredFault = Left stop post was not sensed by "Stop Post Lowered" switch.  Check "Stop Post Lowered" switch and solenoid.
LeftStopPostRaisedFault = Left stop post was not sensed by "Stop Post Raised" switch.  Check "Stop Post Raised" switch and solenoid.
MotorTaskHearbeatFault = The program checks the on-off state of various program tasks.  The state of the motor tasks indicates that there is a motor fault.  Check motor.
PanelEStopPushbuttonDepressed = Make sure that no one is performing maintenance.  Then reset panel E-Stop pushbutton.
PanelTemperatureHighWarning = Check A/C or fan inside main electrical cabinet and recharge or replace as needed.
PLC5Rack1Fault = Check cable connection between PLC and remote I/O module in remote rack.  Check dip switch settings.
PLC5Rack2Fault = Check cable connection between PLC and remote I/O module in remote rack.  Check dip switch settings.
PLC5Rack3Fault = Check cable connection between PLC and remote I/O module in remote rack.  Check dip switch settings.
PLCBatteryLowFault = Check batteries and replace as required.  DO NOT shut off machine power before the batteries are replaced or the program will have to be reloaded.
RetainingRollLockDisengagedFault = Retaining roll lock disengaged was not sensed by "Retaining roll lock disengaged" switch.  Check "Retaining roll lock disengaged" switch and solenoid.
RetainingRollLockEngagedFault = Retaining roll lock engaged was not sensed by "Retaining roll lock engaged" switch.  Check "Retaining roll lock engaged" switch and solenoid.
RightFrontRollMotorDisconnectOpen = Right front roll motor disconnect is in OFF (open) position.  Make sure that no one is performing maintenance and then place disconnect in ON (closed) position.
RightFrontRollMotorDriveFault = Drive problem.  Drop and raise retaining rolls to clear the fault.  If this does not work, press the RESET key on the motor drive keypad.  Check encoder and coupling.  If the fault does not clear or continues to set frequently, contact Burke E. Porter for assistance.
RightRearRollMotorDisconnectOpen = Right rear roll motor disconnect is in OFF (open) position.  Make sure that no one is performing maintenance and then place disconnect in ON (closed) position.
RightRearRollMotorDriveFault = Drive problem.  Drop and raise retaining rolls to clear the fault.  If this does not work, press the RESET key on the motor drive keypad.  Check encoder and coupling.  If the fault does not clear or continues to set frequently, contact Burke E. Porter for assistance.
RightStopPostLoweredFault = Right stop post was not sensed by "Stop Post Lowered" switch.  Check "Stop Post Lowered" switch and solenoid.
RightStopPostRaisedFault = Right stop post was not sensed by "Stop Post Raised" switch.  Check "Stop Post Raised" switch and solenoid.
RollMotorPowerSupplyAlarmOn = Roll motor power supply alarm is on.  Check roll motor power supply and reset alarm.
SolenoidCircuitBreakerOpenPanel = Locate tripped circuit breaker in panel and reset.
SolenoidFuseOpenJBox = Locate blown fuse in J-Box and replace.
SystemAirPressureLowFault = Place main air shut-off valve in ON (open) position.  If this does not work, check plant air pressure.  If low, have plant personnel increase pressure.
WBPositionValueOutOfLimit = Wheelbase position value is out of limits.  Reprogram PLC for correct limits. 
WheelbaseMotorDisconnectOpen = Wheelbase motor disconnect is in OFF (open) position.  Make sure that no one is performing maintenance and then place disconnect in ON (closed) position.
WheelbaseMotorDriveFault = Wheelbase motor drive has faulted out.  Check wheelbase brake solenoid and check for mechanical jam or binding.  Check variable frequency drive.  
WheelbasePositioningFault = Wheelbase position fault.  Check to see if transducer is improperly adjusted, drive belt is loose, or motor has malfunctioned.  
